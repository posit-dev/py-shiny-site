name: Set up uv (Python from Makefile)
description: >
  Read PYTHON_VERSION from the repo Makefile (single source of truth) and
  install uv configured for that Python. Requires the repo to be checked out
  first. Exposes the resolved version as the `python-version` output.

outputs:
  python-version:
    description: The Python version read from the Makefile.
    value: ${{ steps.python-version.outputs.version }}

runs:
  using: composite
  steps:
    # Single source of truth: the Makefile's `PYTHON_VERSION ?= ...` controls
    # the venv Python, so read it here rather than hardcoding a version.
    - name: Read Python version from Makefile
      id: python-version
      shell: bash
      run: |
        version="$(sed -n 's/^PYTHON_VERSION[[:space:]]*?=[[:space:]]*//p' Makefile | head -n1)"
        if [ -z "$version" ]; then
          echo "::error::Could not read PYTHON_VERSION from Makefile"
          exit 1
        fi
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ steps.python-version.outputs.version }}
