name: Build and deploy docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  QUARTO_VERSION: 1.7.23

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/internal/build-cache-restore
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # The version of Python to set UV_PYTHON to
          python-version: ${{ matrix.python-version }}

      # =====================================================
      # Install dependencies
      # =====================================================
      - name: Check out submodules
        run: |
          make submodules

      - uses: quarto-dev/quarto-actions/setup@v2
        id: quarto
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Install R
        uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          install-quarto: false
          packages: |
            any::knitr
            any::rmarkdown
            any::reticulate

      # =====================================================
      # Install Python dependencies
      # =====================================================
      - name: Install Python dependencies
        run: |
          make deps

      # =====================================================
      # Try to use py-shiny shinylive artifact
      # =====================================================
      - name: Try shinylive artifact from main branch
        id: artifact_main
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          repo: posit-dev/py-shiny
          workflow: build-docs.yaml
          workflow_conclusion: success
          branch: main
          name: shinylive-build
          path: _shinylive-pr-build/
          if_no_artifact_found: fail
          check_artifacts: true
          allow_forks: false

      - name: Try shinylive artifact from any branch
        id: artifact_any
        if: steps.artifact_main.outcome == 'failure'
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          repo: posit-dev/py-shiny
          workflow: build-docs.yaml
          workflow_conclusion: success
          name: shinylive-build
          path: _shinylive-pr-build/
          if_no_artifact_found: fail
          check_artifacts: true
          allow_forks: false

      - name: Install py-shiny shinylive artifact assets
        if: steps.artifact_main.outcome == 'success' || steps.artifact_any.outcome == 'success'
        run: |
          if [ "${{ steps.artifact_main.outcome }}" == "success" ]; then
            echo "🔵 Installing shinylive artifact from main branch..."
          else
            echo "🔵 Installing shinylive artifact from feature branch..."
          fi
          . .venv/bin/activate && shinylive assets install-from-local "${GITHUB_WORKSPACE}/_shinylive-pr-build"
          echo "✓ Shinylive artifact assets installed successfully"

      - name: Log using standard shinylive
        if: steps.check_artifact_main.outcome != 'success' && steps.check_artifact_any.outcome != 'success'
        run: |
          echo "ℹ️  No py-shiny shinylive artifact found, using standard PyPI shinylive assets"
          . .venv/bin/activate && echo "   (shinylive version: $(shinylive --version))"

      # =====================================================
      # Build
      # =====================================================
      - name: Build site
        run: |
          make all QUARTO_PATH=quarto

      # =====================================================
      # Deploy docs to Netlify
      # =====================================================

      - name: Configure pull release name
        if: ${{github.event_name == 'pull_request'}}
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          echo "RELEASE_NAME=pr-${PR_NUMBER}" >> $GITHUB_ENV
      - name: Configure branch release name
        if: ${{github.event_name != 'pull_request'}}
        run: |
          # use branch name, but replace slashes. E.g. feat/a -> feat-a
          echo "RELEASE_NAME=${GITHUB_REF_NAME/\//-}" >> $GITHUB_ENV

      - name: Create Github "view deployment" button in PR
        if: ${{github.event_name == 'pull_request'}}
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: ${{ env.RELEASE_NAME }}
          ref: ${{ github.head_ref }}
          logs: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Deploy to Netlify
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          ALIAS: ${{ steps.deployment.outputs.env }}
        run: |
          npm install -g netlify-cli@15.11.0
          # push main branch to production, others to preview --
          if [ "${REF_NAME}" == "main" ]; then
            netlify deploy --dir=_build/ --prod
          else
            netlify deploy --dir=_build/ --alias="${ALIAS}"
          fi

      - name: Update Github "view deployment" button in PR
        uses: bobheadxi/deployments@v1
        if: ${{ steps.deployment.conclusion != 'failure' && github.event_name == 'pull_request'}}
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env: ${{ steps.deployment.outputs.env }}
          env_url: "https://${{ steps.deployment.outputs.env }}--pyshiny.netlify.app"
          logs: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - uses: ./.github/internal/build-cache-save
