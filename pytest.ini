[pytest]
# Scope collection to the docs-site component tests. This deliberately excludes
# the py-shiny/ submodule, which ships its own pytest config and test suite.
testpaths = components
# Defaults for every run: only the chromium browser, and xdist across all cores.
# Override per-invocation as needed (e.g. `-n0` to run serially / one at a time).
addopts = -ra --browser chromium -n auto
